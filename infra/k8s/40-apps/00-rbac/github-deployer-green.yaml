apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-deployer
  namespace: vs-green
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-deployer
  namespace: vs-green
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "deployments/status", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-deployer
  namespace: vs-green
subjects:
  - kind: ServiceAccount
    name: github-deployer
    namespace: vs-green
roleRef:
  kind: Role
  name: github-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: github-deployer-token
  namespace: vs-green
  annotations:
    kubernetes.io/service-account.name: github-deployer
type: kubernetes.io/service-account-token
