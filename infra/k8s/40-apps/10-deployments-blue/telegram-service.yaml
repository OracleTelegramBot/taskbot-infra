apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-service
  namespace: vs-blue
  labels:
    app: telegram-service
    color: blue
    project: taskbot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: telegram-service, color: blue }
  template:
    metadata:
      labels: { app: telegram-service, color: blue, project: taskbot }
    spec:
      # Sin initContainer — telegram-service no toca DB, no necesita wallet
      containers:
        - name: telegram-service
          image: ghcr.io/oracletelegrambot/taskbot-telegram-service:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8081, protocol: TCP }
          # envFrom inyecta TELEGRAM_BOT_TOKEN del Secret
          envFrom:
            - secretRef: { name: taskbot-secrets }
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: "prod" }
            # Service DNS dentro del MISMO namespace. vs-blue solo ve vs-blue,
            # vs-green solo ve vs-green. Aislamiento blue/green respetado.
            - { name: FEIGN_CLIENT_CONFIG_KPI_SERVICE_URL, value: "http://kpi-service:8080" }
            - { name: AUTH_SERVICE_URL, value: "http://auth-service:8082" }
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          # Sin volumeMounts (no wallet)
          resources:
            # Más ligero que los otros — no JDBC pool, no Hibernate
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
      # Sin volumes
