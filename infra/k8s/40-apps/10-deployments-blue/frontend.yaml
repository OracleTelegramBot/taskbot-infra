apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vs-blue
  labels:
    app: frontend
    color: blue
    project: taskbot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: frontend, color: blue }
  template:
    metadata:
      labels: { app: frontend, color: blue, project: taskbot }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/lilianaramosvz/taskbot-frontend:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 80, protocol: TCP }
          env:
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 300m, memory: 256Mi }
          # nginx default serves / — probe contra raíz. Si tu SPA usa hash router
          # podrías necesitar un /health.html servido por nginx (más robusto).
          livenessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
