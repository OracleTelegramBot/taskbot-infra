apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskbot
  namespace: vs-blue
  labels:
    app: taskbot
    color: blue
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: sammy-ulfh.dev
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service: { name: auth-service, port: { number: 8082 } }
          - path: /api/kpis
            pathType: Prefix
            backend:
              service: { name: kpi-service, port: { number: 8080 } }
          - path: /api/webhook/telegram
            pathType: Prefix
            backend:
              service: { name: telegram-service, port: { number: 8081 } }
          - path: /api/anuncios
            pathType: Prefix
            backend:
              service: { name: telegram-service, port: { number: 8081 } }
          - path: /api/ai
            pathType: Prefix
            backend:
              service: { name: ai-service, port: { number: 8083 } }
          - path: /api/sprints
            pathType: Prefix
            backend:
              service: { name: task-service, port: { number: 8084 } }
          - path: /api/tasks
            pathType: Prefix
            backend:
              service: { name: task-service, port: { number: 8084 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
