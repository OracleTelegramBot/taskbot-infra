apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskbot
  namespace: vs-blue
  labels:
    app: taskbot
    color: blue
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: sammy-ulfh.dev
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service: { name: auth-service, port: { number: 8082 } }
          - path: /api/kpis
            pathType: Prefix
            backend:
              service: { name: kpi-service, port: { number: 8080 } }
          - path: /api/webhook/telegram
            pathType: Prefix
            backend:
              service: { name: telegram-service, port: { number: 8081 } }
          - path: /api/anuncios
            pathType: Prefix
            backend:
              service: { name: telegram-service, port: { number: 8081 } }
          - path: /api/ai
            pathType: Prefix
            backend:
              service: { name: ai-service, port: { number: 8083 } }
          - path: /api/sprints
            pathType: Prefix
            backend:
              service: { name: task-service, port: { number: 8084 } }
          - path: /api/tasks
            pathType: Prefix
            backend:
              service: { name: task-service, port: { number: 8084 } }
          # === Swagger UI por servicio ===
          - path: /swagger-ui/auth.html
            pathType: Exact
            backend:
              service:
                name: auth-service
                port: { number: 8082 }
          - path: /v3/api-docs/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port: { number: 8082 }

          - path: /swagger-ui/kpi.html
            pathType: Exact
            backend:
              service:
                name: kpi-service
                port: { number: 8080 }
          - path: /v3/api-docs/kpi
            pathType: Prefix
            backend:
              service:
                name: kpi-service
                port: { number: 8080 }

          - path: /swagger-ui/ai.html
            pathType: Exact
            backend:
              service:
                name: ai-service
                port: { number: 8083 }
          - path: /v3/api-docs/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port: { number: 8083 }

          - path: /swagger-ui/task.html
            pathType: Exact
            backend:
              service:
                name: task-service
                port: { number: 8084 }
          - path: /v3/api-docs/task
            pathType: Prefix
            backend:
              service:
                name: task-service
                port: { number: 8084 }

          - path: /swagger-ui/telegram.html
            pathType: Exact
            backend:
              service:
                name: telegram-service
                port: { number: 8081 }
          - path: /v3/api-docs/telegram
            pathType: Prefix
            backend:
              service:
                name: telegram-service
                port: { number: 8081 }

          # === Assets compartidos de Swagger UI (CSS, JS, fonts) ===
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port: { number: 8082 }
          - path: /webjars
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port: { number: 8082 }

          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
