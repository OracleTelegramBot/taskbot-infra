apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi-service
  namespace: vs-green
  labels:
    app: kpi-service
    color: green
    project: taskbot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: kpi-service, color: green }
  template:
    metadata:
      labels: { app: kpi-service, color: green, project: taskbot }
    spec:
      initContainers:
        - name: download-wallet
          image: ghcr.io/oracle/oci-cli:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              oci os object get --auth instance_principal \
                --namespace-name "$OS_NAMESPACE" \
                --bucket-name "$WALLET_BUCKET" \
                --name "$WALLET_OBJECT" \
                --file /tmp/wallet.zip
              python3 -m zipfile -e /tmp/wallet.zip /wallet/
              rm /tmp/wallet.zip
          envFrom:
            - configMapRef: { name: oci-config }
          volumeMounts:
            - { name: wallet, mountPath: /wallet }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 200m, memory: 256Mi }
      containers:
        - name: kpi-service
          image: ghcr.io/oracletelegrambot/taskbot-kpi-service:1c0b5c41cc877a84c352a6bbc8c17d6fe0eb4a83
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
          envFrom:
            - secretRef: { name: taskbot-secrets }
          env:
            - name: CORS_ALLOWED_ORIGINS
              value: "https://sammy-ulfh.dev,http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173"
            - { name: SPRING_PROFILES_ACTIVE, value: "prod" }
            - { name: TNS_ADMIN, value: "/app/Wallet" }
            - { name: ORACLE_WALLET_PATH, value: "/app/Wallet" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:oracle:thin:@gestiondetareasbd_tp?TNS_ADMIN=/app/Wallet" }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: taskbot-secrets, key: DB_ADMIN_USERNAME } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: taskbot-secrets, key: DB_ADMIN_PASSWORD } }
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          volumeMounts:
            - { name: wallet, mountPath: /app/Wallet, readOnly: true }
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          # Startup probe: tolera arranque lento de Spring Boot (hasta ~5 min)
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          # Liveness: NO depende de DB. Solo verifica que el proceso responda.
          # Si falla 5 veces seguidas (2.5 min), K8s reinicia el pod.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5

          # Readiness: SÍ depende de DB. Si DB cae, el pod sale del pool de
          # endpoints del Service (NGINX deja de enviarle tráfico) pero el pod
          # NO se reinicia.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: wallet
          emptyDir: {}
