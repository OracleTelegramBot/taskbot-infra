# =========================================================================
# Redis para sesiones de telegram-service — namespace vs-blue
#
# Sin persistencia (volumen efímero) — si Redis cae, los usuarios re-loguean.
# Una instancia por namespace para respetar el aislamiento blue/green.
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vs-blue
  labels:
    app: redis
    color: blue
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vs-blue
  labels:
    app: redis
    color: blue
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        color: blue
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - "200mb"
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
