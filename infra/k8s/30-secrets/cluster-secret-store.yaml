# =========================================================
# ClusterSecretStore — puente entre Kubernetes y OCI Vault
#
# Define cómo ESO se autentica contra OCI y de qué Vault lee.
# Autenticación InstancePrincipal: ESO toma la identidad del
# worker node donde corre, que pertenece al Dynamic Group
# "taskbot-oke-nodes-dg" con policy de read secret-family +
# use keys en el compartment de TaskBot.
#
# Es ClusterSecretStore (no SecretStore namespaced), así que
# cualquier ExternalSecret en cualquier namespace puede usarlo.
# =========================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: oci-vault
spec:
  provider:
    oracle:
      vault: ocid1.vault.oc1.mx-queretaro-1.ibvb7hzyaad46.abyxeljrwokl5rntglkq3px2rhn5fpypmscevlyv6nwtblwd3tweucxryo6q
      region: mx-queretaro-1
      principalType: InstancePrincipal
