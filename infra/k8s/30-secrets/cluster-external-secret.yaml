apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: taskbot-secrets
spec:
  externalSecretName: taskbot-secrets
  namespaceSelector:
    matchLabels:
      project: taskbot
  externalSecretSpec:
    refreshInterval: 5m
    secretStoreRef:
      kind: ClusterSecretStore
      name: oci-vault
    target:
      name: taskbot-secrets
      creationPolicy: Owner
    data:
      - secretKey: JWT_SECRET                      
        remoteRef: { key: taskbot-jwt-secret }
      - secretKey: OPENAI_API_KEY                  
        remoteRef: { key: taskbot-openai-api-key }
      - secretKey: TELEGRAM_BOT_TOKEN             
        remoteRef: { key: taskbot-telegram-bot-token }
      - secretKey: DB_ADMIN_USERNAME               
        remoteRef: { key: taskbot-db-admin-username }
      - secretKey: DB_ADMIN_PASSWORD              
        remoteRef: { key: taskbot-db-admin-password }
      - secretKey: WALLET_PASSWORD                
        remoteRef: { key: taskbot-wallet-password }
