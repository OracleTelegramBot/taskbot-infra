name: Deploy to OKE (Blue/Green)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de imagen a deployar (develop, latest, o SHA específico)'
        required: true
        default: develop
        type: string
      target_color:
        description: 'Color destino (auto = opuesto del activo)'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - blue
          - green
      skip_cutover:
        description: 'Aplicar deployments pero NO switchear Ingress'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.32.0'

      - name: Write kubeconfigs from secrets
        run: |
          if [[ -z "${{ secrets.OKE_KUBECONFIG_BLUE }}" ]]; then
            echo "::error::Secret OKE_KUBECONFIG_BLUE no está definido en este repo"
            exit 1
          fi
          if [[ -z "${{ secrets.OKE_KUBECONFIG_GREEN }}" ]]; then
            echo "::error::Secret OKE_KUBECONFIG_GREEN no está definido en este repo"
            exit 1
          fi

          echo "${{ secrets.OKE_KUBECONFIG_BLUE }}"  | base64 -d > /tmp/kc-blue.yaml
          echo "${{ secrets.OKE_KUBECONFIG_GREEN }}" | base64 -d > /tmp/kc-green.yaml
          chmod 600 /tmp/kc-blue.yaml /tmp/kc-green.yaml

      - name: Verify cluster connectivity
        run: |
          set -e
          echo "=== Tamaño y primeras líneas de kubeconfigs ==="
          ls -la /tmp/kc-*.yaml

          echo "=== Test blue ==="
          KUBECONFIG=/tmp/kc-blue.yaml kubectl version --client=false --output=yaml || {
            echo "::error::kubectl no puede conectar con kubeconfig-blue"
            head -20 /tmp/kc-blue.yaml
            exit 1
          }

          echo "=== Test green ==="
          KUBECONFIG=/tmp/kc-green.yaml kubectl version --client=false --output=yaml || {
            echo "::error::kubectl no puede conectar con kubeconfig-green"
            head -20 /tmp/kc-green.yaml
            exit 1
          }

          echo "✅ Ambos kubeconfigs funcionan"

      - name: Determine active and target colors
        id: colors
        run: |
          set -e

          BLUE_EXISTS=$(KUBECONFIG=/tmp/kc-blue.yaml  kubectl get ingress taskbot -n vs-blue  --ignore-not-found -o name)
          GREEN_EXISTS=$(KUBECONFIG=/tmp/kc-green.yaml kubectl get ingress taskbot -n vs-green --ignore-not-found -o name)

          if [[ -n "$BLUE_EXISTS" && -n "$GREEN_EXISTS" ]]; then
            echo "::error::Ambos Ingresses existen (split brain). Borra uno manualmente."
            exit 1
          elif [[ -n "$BLUE_EXISTS" ]]; then
            ACTIVE=blue; AUTO_TARGET=green
          elif [[ -n "$GREEN_EXISTS" ]]; then
            ACTIVE=green; AUTO_TARGET=blue
          else
            ACTIVE=none; AUTO_TARGET=blue
          fi

          USER_TARGET="${{ inputs.target_color }}"
          if [[ "$USER_TARGET" == "auto" ]]; then
            TARGET=$AUTO_TARGET
          else
            TARGET=$USER_TARGET
          fi

          echo "active=$ACTIVE"  >> $GITHUB_OUTPUT
          echo "target=$TARGET"  >> $GITHUB_OUTPUT
          echo "::notice title=Deploy plan::Active=$ACTIVE → Target=$TARGET, Tag=${{ inputs.image_tag }}"

      - name: Substitute IMAGE_TAG in target manifests
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          sed -i "s|:IMAGE_TAG|:${{ inputs.image_tag }}|g" \
            infra/k8s/40-apps/10-deployments-${TARGET}/*.yaml

          echo "Imágenes que se van a aplicar:"
          grep -h "image:" infra/k8s/40-apps/10-deployments-${TARGET}/*.yaml | sort -u

      - name: Apply Redis to target color
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl apply \
            -f infra/k8s/40-apps/05-redis/redis-${TARGET}.yaml

          # Esperar a que Redis esté Ready antes de desplegar telegram-service
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl rollout status \
            deployment/redis -n vs-${TARGET} --timeout=120s

      - name: Apply deployments to target color
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl apply \
            -f infra/k8s/40-apps/10-deployments-${TARGET}/

      - name: Wait for BACKEND rollouts
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          export KUBECONFIG=/tmp/kc-${TARGET}.yaml
          for svc in auth-service kpi-service telegram-service ai-service task-service; do
            echo "::group::$svc"
            kubectl rollout status deployment/$svc -n vs-${TARGET} --timeout=300s
            echo "::endgroup::"
          done

      - name: Restart and verify frontend rollout
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          export KUBECONFIG=/tmp/kc-${TARGET}.yaml
          
          echo "::group::frontend"
          
          # 1. Forzar nuevo ReplicaSet → dispara image pull en los pods nuevos
          # Necesario porque el manifest del frontend usa :latest hardcoded,
          # entonces kubectl apply no detecta cambios y no dispara rollout por sí solo.
          echo "Triggering rollout restart to pull latest image..."
          kubectl rollout restart deployment/frontend -n vs-${TARGET}
          
          # 2. Esperar a que el rollout complete
          kubectl rollout status deployment/frontend -n vs-${TARGET} --timeout=180s || \
            echo "::warning::Frontend no quedó Ready (probablemente imagen privada o no actualizada). El resto del deploy continúa."
          
          # 3. Log informativo: mostrar el imageID actual de los pods nuevos
          # (útil para diagnosticar si la imagen efectivamente cambió)
          echo "Imagen efectiva en pods de frontend:"
          kubectl get pods -n vs-${TARGET} -l app=frontend \
            -o jsonpath='{range .items[*]}{.metadata.name}{": "}{.status.containerStatuses[0].imageID}{"\n"}{end}' || true
          
          echo "::endgroup::"

      # =========================================================================
      # CUTOVER: delete viejo → apply nuevo
      #
      # El admission webhook de NGINX Ingress impide que dos Ingresses tengan el
      # mismo host+path simultáneamente (aunque sean de namespaces distintos),
      # por eso NO podemos hacer "apply nuevo → delete viejo". Hay que invertirlo.
      #
      # Trade-off: ~5-10 segundos de downtime durante el cutover (entre delete
      # del viejo y apply del nuevo). Aceptable para deploys esporádicos.
      # =========================================================================
      - name: Cutover (delete old Ingress, then apply new)
        if: ${{ inputs.skip_cutover != true }}
        run: |
          set -e
          ACTIVE=${{ steps.colors.outputs.active }}
          TARGET=${{ steps.colors.outputs.target }}

          if [[ "$ACTIVE" != "none" && "$ACTIVE" != "$TARGET" ]]; then
            echo "::group::Deleting active Ingress in vs-${ACTIVE}"
            KUBECONFIG=/tmp/kc-${ACTIVE}.yaml kubectl delete ingress taskbot \
              -n vs-${ACTIVE} --ignore-not-found
            # Breve espera para que NGINX procese la baja antes de aplicar el nuevo
            sleep 5
            echo "::endgroup::"
          else
            echo "No hay Ingress activo previo en otro color, saltando paso de delete."
          fi

          echo "::group::Applying new Ingress in vs-${TARGET}"
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl apply \
            -f infra/k8s/40-apps/30-ingress/ingress-${TARGET}.yaml
          # Espera para que NGINX reconcile y empiece a servir desde el nuevo Ingress
          sleep 10
          echo "::endgroup::"

      - name: Verify cutover
        if: ${{ inputs.skip_cutover != true }}
        run: |
          TARGET=${{ steps.colors.outputs.target }}
          echo "Ingress activo en vs-${TARGET}:"
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl get ingress taskbot -n vs-${TARGET} -o wide

      # =========================================================================
      # SMOKE TESTS POST-CUTOVER
      #
      # Verifica que el dominio responde correctamente tras el switch.
      # Si cualquier endpoint crítico devuelve 5xx, marca el step como failed
      # y dispara el auto-rollback en el siguiente step.
      #
      # Criterios:
      # - 2xx, 3xx, 4xx → OK (backend responde, aunque la request sea inválida)
      # - 5xx           → FAIL (backend roto)
      # - Timeout       → FAIL (backend colgado)
      # =========================================================================
      - name: Post-cutover smoke tests
        id: smoke
        if: ${{ inputs.skip_cutover != true }}
        continue-on-error: true
        run: |
          set -e
          DOMAIN="sammy-ulfh.dev"
          
          echo "Esperando 15 seg para que NGINX reconcile el nuevo Ingress..."
          sleep 15

          declare -a FAILURES=()

          # Endpoints públicos críticos: deben responder algo != 5xx
          # Cada entrada: "METHOD|PATH|DESCRIPCION"
          ENDPOINTS=(
            "POST|/api/v1/auth/login|Auth login"
            "GET|/api/kpis|KPI list"
            "GET|/api/ai|AI root"
            "GET|/api/sprints|Tasks sprints"
            "GET|/v3/api-docs/auth|OpenAPI spec auth"
            "GET|/v3/api-docs/kpi|OpenAPI spec kpi"
            "GET|/v3/api-docs/ai|OpenAPI spec ai"
            "GET|/v3/api-docs/task|OpenAPI spec task"
            "GET|/v3/api-docs/telegram|OpenAPI spec telegram"
            "GET|/swagger-ui/index.html|Swagger UI"
            "GET|/|Frontend SPA"
          )

          echo "::group::Smoke tests"
          for entry in "${ENDPOINTS[@]}"; do
            IFS='|' read -r METHOD PATH_ DESC <<< "$entry"
            
            if [[ "$METHOD" == "POST" ]]; then
              CODE=$(curl -so /dev/null -w "%{http_code}" \
                -X POST "https://${DOMAIN}${PATH_}" \
                -H "Content-Type: application/json" \
                -d '{}' \
                --max-time 10 || echo "000")
            else
              CODE=$(curl -so /dev/null -w "%{http_code}" \
                "https://${DOMAIN}${PATH_}" \
                --max-time 10 || echo "000")
            fi

            if [[ "$CODE" == "000" ]]; then
              echo "❌ ${DESC} (${METHOD} ${PATH_}) → TIMEOUT/CONNECTION_ERROR"
              FAILURES+=("${DESC}: timeout")
            elif [[ "$CODE" -ge 500 ]]; then
              echo "❌ ${DESC} (${METHOD} ${PATH_}) → HTTP ${CODE}"
              FAILURES+=("${DESC}: HTTP ${CODE}")
            else
              echo "✓ ${DESC} (${METHOD} ${PATH_}) → HTTP ${CODE}"
            fi
          done
          echo "::endgroup::"

          if [[ ${#FAILURES[@]} -gt 0 ]]; then
            echo "::error title=Smoke tests fallaron::Detectados ${#FAILURES[@]} endpoints con error 5xx o timeout"
            for f in "${FAILURES[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

          echo "✅ Todos los smoke tests pasaron (${#ENDPOINTS[@]} endpoints OK)"

      # =========================================================================
      # AUTO-ROLLBACK
      #
      # Si los smoke tests fallaron Y había un color activo previo (no es el
      # primer deploy), revertir: borrar Ingress del color nuevo y re-aplicar
      # el del viejo.
      # 
      # Esto NO toca los Deployments — los pods del color malo siguen ahí pero
      # sin recibir tráfico. Útil para debug post-mortem.
      # =========================================================================
      - name: Auto-rollback on smoke test failure
        if: ${{ steps.smoke.outcome == 'failure' && inputs.skip_cutover != true && steps.colors.outputs.active != 'none' && steps.colors.outputs.active != steps.colors.outputs.target }}
        run: |
          set -e
          ACTIVE=${{ steps.colors.outputs.active }}
          TARGET=${{ steps.colors.outputs.target }}

          echo "::error title=ROLLBACK AUTOMÁTICO::Smoke tests fallaron. Revirtiendo de vs-${TARGET} a vs-${ACTIVE}."

          # Step 1: borra el Ingress del color malo
          echo "::group::Borrando Ingress del color destino (vs-${TARGET})"
          KUBECONFIG=/tmp/kc-${TARGET}.yaml kubectl delete ingress taskbot \
            -n vs-${TARGET} --ignore-not-found
          sleep 5
          echo "::endgroup::"

          # Step 2: re-aplica el Ingress del color viejo
          echo "::group::Re-aplicando Ingress del color anterior (vs-${ACTIVE})"
          KUBECONFIG=/tmp/kc-${ACTIVE}.yaml kubectl apply \
            -f infra/k8s/40-apps/30-ingress/ingress-${ACTIVE}.yaml
          sleep 10
          echo "::endgroup::"

          # Step 3: verifica que el rollback quedó activo
          KUBECONFIG=/tmp/kc-${ACTIVE}.yaml kubectl get ingress taskbot -n vs-${ACTIVE} -o wide

          echo "::warning title=Rollback completado::Tráfico de vuelta en vs-${ACTIVE}. Investiga los pods de vs-${TARGET} antes del próximo deploy."
          
          # Falla el workflow para que quede claro en GitHub Actions que algo salió mal
          exit 1

      # =========================================================================
      # FALLO DE SMOKE TESTS SIN ROLLBACK POSIBLE
      #
      # Si es el primer deploy (no había color activo previo) y los smoke tests
      # fallaron, no podemos hacer rollback. Solo fallamos el workflow.
      # =========================================================================
      - name: Fail workflow if smoke tests failed without rollback option
        if: ${{ steps.smoke.outcome == 'failure' && (steps.colors.outputs.active == 'none' || steps.colors.outputs.active == steps.colors.outputs.target) }}
        run: |
          echo "::error::Smoke tests fallaron en deploy inicial (no hay color anterior al cual revertir)."
          echo "::error::Los pods están deployed pero el dominio devuelve errores. Investiga antes de servir tráfico."
          exit 1

      - name: Summary
        if: always()
        run: |
          ACTIVE_OLD="${{ steps.colors.outputs.active }}"
          ACTIVE_NEW="${{ steps.colors.outputs.target }}"
          SKIPPED="${{ inputs.skip_cutover }}"

          SMOKE_OUTCOME="${{ steps.smoke.outcome }}"
          
          if [[ "$SKIPPED" == "true" ]]; then
            CUTOVER_STATUS="SKIPPED"
          elif [[ "$SMOKE_OUTCOME" == "failure" ]]; then
            CUTOVER_STATUS="ROLLED_BACK (smoke tests failed)"
          else
            CUTOVER_STATUS="OK"
          fi

          {
            echo "## Deploy summary"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Color previo | \`vs-${ACTIVE_OLD}\` |"
            if [[ "$SKIPPED" == "true" ]]; then
              echo "| Color destino (aplicado, NO cutover) | \`vs-${ACTIVE_NEW}\` |"
            else
              echo "| Color ahora activo | \`vs-${ACTIVE_NEW}\` |"
            fi
            echo "| Image tag | \`${{ inputs.image_tag }}\` |"
            echo "| Cutover | $CUTOVER_STATUS |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ACTIVE_OLD" != "none" && "$ACTIVE_OLD" != "$ACTIVE_NEW" && "$SKIPPED" != "true" ]]; then
            echo "### 🔁 Rollback rápido" >> "$GITHUB_STEP_SUMMARY"
            echo "Para volver al estado anterior, re-ejecuta este workflow con \`target_color: $ACTIVE_OLD\`." >> "$GITHUB_STEP_SUMMARY"
          fi
